spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: payment-service
          uri: http://localhost:8082
          predicates:
            - Path=/payments/**

        - id: account-service
          uri: http://localhost:8083
          predicates:
            - Path=/accounts/**

